name: Build & Package RONE Plugins Installer

# ============================================================================
# Triggers
# ============================================================================
on:
  push:
    branches: [main]
    tags:     ['v*']

permissions:
  contents: write   # needed to create GitHub Releases

# ============================================================================
# JOB 1 — detect-changes
# Fast ubuntu runner: figure out which plugins actually changed so the build
# matrix can skip unnecessary full rebuilds (caching does the rest).
# ============================================================================
jobs:
  detect-changes:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    outputs:
      reverse_reverb: ${{ steps.force.outputs.reverse_reverb || steps.filter.outputs.reverse_reverb }}
      stems_fixer:    ${{ steps.force.outputs.stems_fixer    || steps.filter.outputs.stems_fixer    }}
      stutter:        ${{ steps.force.outputs.stutter        || steps.filter.outputs.stutter        }}
      flanger:        ${{ steps.force.outputs.flanger        || steps.filter.outputs.flanger        }}
      plugins_center: ${{ steps.force.outputs.plugins_center || steps.filter.outputs.plugins_center }}

    steps:
      - name: Checkout root (no submodules needed)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 2

      # On a version-tag push we always do a full clean release build
      - name: Force all plugins changed (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        id: force
        run: |
          echo "reverse_reverb=true" >> $GITHUB_OUTPUT
          echo "stems_fixer=true"    >> $GITHUB_OUTPUT
          echo "stutter=true"        >> $GITHUB_OUTPUT
          echo "flanger=true"        >> $GITHUB_OUTPUT
          echo "plugins_center=true" >> $GITHUB_OUTPUT

      # On branch pushes compare against the previous commit
      - name: Detect changed plugin submodule pointers
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            reverse_reverb:
              - 'ReverseReverbVST'
              - '.github/workflows/**'
              - 'installer/**'
            stems_fixer:
              - 'RoneStemsFixer'
              - '.github/workflows/**'
              - 'installer/**'
            stutter:
              - 'RoneStutter'
              - '.github/workflows/**'
              - 'installer/**'
            flanger:
              - 'rone-flanger-'
              - '.github/workflows/**'
              - 'installer/**'
            plugins_center:
              - 'RonePluginsCenter'
              - '.github/workflows/**'
              - 'installer/**'

# ============================================================================
# JOB 2 — build-windows  (matrix: 5 × windows-latest running in parallel)
# Each slot builds one plugin, caches its build-ci/ directory, and uploads
# the compiled artifacts so the package job can assemble them.
# ============================================================================
  build-windows:
    name: Build ${{ matrix.plugin_id }} (Windows)
    needs: detect-changes
    runs-on: windows-latest
    strategy:
      fail-fast: false    # let other plugins finish even if one fails
      matrix:
        include:
          # ------------------------------------------------------------------
          - plugin_id:      reverse_reverb
            folder:         ReverseReverbVST
            cmake_project:  ReverseReverb
            needs_webview2: "true"
            webview2_flag:  JUCE_WEBVIEW2_PACKAGE_LOCATION
            is_flanger:     "false"
            juce_version:   "8.0.4"
          # ------------------------------------------------------------------
          - plugin_id:      stems_fixer
            folder:         RoneStemsFixer
            cmake_project:  RoneStemsFixer
            needs_webview2: "false"
            is_flanger:     "false"
            juce_version:   "8.0.12"
          # ------------------------------------------------------------------
          - plugin_id:      stutter
            folder:         RoneStutter
            cmake_project:  RoneStutter
            needs_webview2: "true"
            webview2_flag:  FETCHCONTENT_SOURCE_DIR_WEBVIEW2
            is_flanger:     "false"
            juce_version:   "8.0.4"
          # ------------------------------------------------------------------
          - plugin_id:      flanger
            folder:         rone-flanger-
            cmake_project:  ManualFlanger
            needs_webview2: "false"
            is_flanger:     "true"
            juce_version:   "local-8.0.12"
          # ------------------------------------------------------------------
          - plugin_id:      plugins_center
            folder:         RonePluginsCenter
            cmake_project:  RonePluginsCenter
            needs_webview2: "false"
            is_flanger:     "false"
            juce_version:   "8.0.12"

    steps:
      # -----------------------------------------------------------------------
      # 1. Auth + checkout — only materialise THIS plugin's submodule
      # -----------------------------------------------------------------------
      - name: Inject PAT into git for private submodule clones
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout root repo (no submodules yet)
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Checkout ${{ matrix.folder }} submodule only
        run: git submodule update --init --depth 1 -- "${{ matrix.folder }}"

      # -----------------------------------------------------------------------
      # 2. MSVC build environment
      # -----------------------------------------------------------------------
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -----------------------------------------------------------------------
      # 3. Cache — full build-ci/ directory
      # -----------------------------------------------------------------------
      - name: Restore build cache for ${{ matrix.plugin_id }}
        uses: actions/cache@v4
        id: cache-build
        with:
          path: ${{ matrix.folder }}/build-ci
          key:  build-${{ matrix.plugin_id }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-${{ matrix.plugin_id }}-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. WebView2 NuGet cache (reverse_reverb + stutter only)
      # -----------------------------------------------------------------------
      - name: Restore WebView2 NuGet cache
        if: matrix.needs_webview2 == 'true'
        uses: actions/cache@v4
        id: cache-webview2
        with:
          path: ${{ github.workspace }}\webview2
          key:  webview2-nuget-1.0.1901.177

      - name: Download WebView2 SDK
        if: matrix.needs_webview2 == 'true' && steps.cache-webview2.outputs.cache-hit != 'true'
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.1901.177 -OutputDirectory "${{ github.workspace }}\webview2"

      # -----------------------------------------------------------------------
      # 5. rone-flanger: cache the sparse-cloned extras/Build directory
      # -----------------------------------------------------------------------
      - name: Restore rone-flanger JUCE extras/Build cache
        if: matrix.is_flanger == 'true'
        uses: actions/cache@v4
        id: cache-extras
        with:
          path: rone-flanger-/JUCE/extras/Build
          key:  flanger-juce-extras-8.0.12-${{ runner.os }}

      - name: Fetch missing JUCE extras/Build (rone-flanger-)
        if: matrix.is_flanger == 'true' && steps.cache-extras.outputs.cache-hit != 'true'
        working-directory: rone-flanger-
        shell: pwsh
        run: |
          git clone --depth 1 --branch 8.0.12 --filter=blob:none --sparse `
            https://github.com/juce-framework/JUCE.git _juce_build_tmp
          Push-Location _juce_build_tmp
          git sparse-checkout set extras/Build
          Pop-Location
          Copy-Item -Recurse -Force "_juce_build_tmp/extras/Build" "JUCE/extras/Build"
          Remove-Item -Recurse -Force _juce_build_tmp

      # -----------------------------------------------------------------------
      # 6. Decide whether this plugin needs building
      # -----------------------------------------------------------------------
      - name: Determine if build is needed
        id: should-build
        shell: pwsh
        run: |
          $changed = switch ("${{ matrix.plugin_id }}") {
            "reverse_reverb" { "${{ needs.detect-changes.outputs.reverse_reverb }}" }
            "stems_fixer"    { "${{ needs.detect-changes.outputs.stems_fixer }}" }
            "stutter"        { "${{ needs.detect-changes.outputs.stutter }}" }
            "flanger"        { "${{ needs.detect-changes.outputs.flanger }}" }
            "plugins_center" { "${{ needs.detect-changes.outputs.plugins_center }}" }
            default          { "true" }
          }
          $cacheHit  = "${{ steps.cache-build.outputs.cache-hit }}"
          $needBuild = ($changed -eq "true") -or ($cacheHit -ne "true")
          echo "PLUGIN_CHANGED=$needBuild" >> $env:GITHUB_ENV
          Write-Host "Plugin changed: $changed  |  Cache hit: $cacheHit  |  Will build: $needBuild"

      # -----------------------------------------------------------------------
      # 7. CMake configure + build
      # -----------------------------------------------------------------------
      - name: CMake configure — ${{ matrix.plugin_id }}
        if: env.PLUGIN_CHANGED == 'True'
        working-directory: ${{ matrix.folder }}
        shell: pwsh
        run: |
          $flags = @(
            "-B", "build-ci",
            "-G", "Visual Studio 17 2022",
            "-A", "x64",
            "-DCMAKE_BUILD_TYPE=Release"
          )
          # WebView2 flag (plugin-specific)
          if ("${{ matrix.needs_webview2 }}" -eq "true") {
            if ("${{ matrix.webview2_flag }}" -eq "JUCE_WEBVIEW2_PACKAGE_LOCATION") {
              $flags += "-DJUCE_WEBVIEW2_PACKAGE_LOCATION=${{ github.workspace }}\webview2"
            } else {
              $flags += "-DFETCHCONTENT_SOURCE_DIR_WEBVIEW2=${{ github.workspace }}\webview2\Microsoft.Web.WebView2.1.0.1901.177"
            }
          }
          cmake @flags

      - name: CMake build — ${{ matrix.plugin_id }}
        if: env.PLUGIN_CHANGED == 'True'
        working-directory: ${{ matrix.folder }}
        run: cmake --build build-ci --config Release --parallel

      # -----------------------------------------------------------------------
      # 8. Upload compiled artifacts
      # -----------------------------------------------------------------------
      - name: Upload plugin artifacts — ${{ matrix.plugin_id }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin_id }}-windows
          path: ${{ matrix.folder }}/build-ci/${{ matrix.cmake_project }}_artefacts/Release/
          retention-days: 1
          if-no-files-found: error

# ============================================================================
# JOB 3 — build-macos  (matrix: 5 × macos-latest running in parallel)
# Builds all plugins for macOS (VST3, AU, Standalone).
# ============================================================================
  build-macos:
    name: Build ${{ matrix.plugin_id }} (macOS)
    needs: detect-changes
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          - plugin_id:      reverse_reverb
            folder:         ReverseReverbVST
            cmake_project:  ReverseReverb
            is_flanger:     "false"
          # ------------------------------------------------------------------
          - plugin_id:      stems_fixer
            folder:         RoneStemsFixer
            cmake_project:  RoneStemsFixer
            is_flanger:     "false"
          # ------------------------------------------------------------------
          - plugin_id:      stutter
            folder:         RoneStutter
            cmake_project:  RoneStutter
            is_flanger:     "false"
          # ------------------------------------------------------------------
          - plugin_id:      flanger
            folder:         rone-flanger-
            cmake_project:  ManualFlanger
            is_flanger:     "true"
          # ------------------------------------------------------------------
          - plugin_id:      plugins_center
            folder:         RonePluginsCenter
            cmake_project:  RonePluginsCenter
            is_flanger:     "false"

    steps:
      - name: Inject PAT into git for private submodule clones
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout root repo
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Checkout ${{ matrix.folder }} submodule only
        run: git submodule update --init --depth 1 -- "${{ matrix.folder }}"

      # -----------------------------------------------------------------------
      # Cache
      # -----------------------------------------------------------------------
      - name: Restore build cache for ${{ matrix.plugin_id }}
        uses: actions/cache@v4
        id: cache-build
        with:
          path: ${{ matrix.folder }}/build-ci
          key:  build-${{ matrix.plugin_id }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-${{ matrix.plugin_id }}-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # rone-flanger: fetch JUCE extras/Build
      # -----------------------------------------------------------------------
      - name: Restore rone-flanger JUCE extras/Build cache
        if: matrix.is_flanger == 'true'
        uses: actions/cache@v4
        id: cache-extras
        with:
          path: rone-flanger-/JUCE/extras/Build
          key:  flanger-juce-extras-8.0.12-${{ runner.os }}

      - name: Fetch missing JUCE extras/Build (rone-flanger-)
        if: matrix.is_flanger == 'true' && steps.cache-extras.outputs.cache-hit != 'true'
        working-directory: rone-flanger-
        run: |
          git clone --depth 1 --branch 8.0.12 --filter=blob:none --sparse \
            https://github.com/juce-framework/JUCE.git _juce_build_tmp
          cd _juce_build_tmp
          git sparse-checkout set extras/Build
          cd ..
          cp -R _juce_build_tmp/extras/Build JUCE/extras/Build
          rm -rf _juce_build_tmp

      # -----------------------------------------------------------------------
      # Determine if build is needed
      # -----------------------------------------------------------------------
      - name: Determine if build is needed
        id: should-build
        run: |
          case "${{ matrix.plugin_id }}" in
            reverse_reverb) changed="${{ needs.detect-changes.outputs.reverse_reverb }}" ;;
            stems_fixer)    changed="${{ needs.detect-changes.outputs.stems_fixer }}" ;;
            stutter)        changed="${{ needs.detect-changes.outputs.stutter }}" ;;
            flanger)        changed="${{ needs.detect-changes.outputs.flanger }}" ;;
            plugins_center) changed="${{ needs.detect-changes.outputs.plugins_center }}" ;;
            *)              changed="true" ;;
          esac
          cache_hit="${{ steps.cache-build.outputs.cache-hit }}"
          if [ "$changed" = "true" ] || [ "$cache_hit" != "true" ]; then
            echo "PLUGIN_CHANGED=true" >> $GITHUB_ENV
          else
            echo "PLUGIN_CHANGED=false" >> $GITHUB_ENV
          fi
          echo "Plugin changed: $changed | Cache hit: $cache_hit"

      # -----------------------------------------------------------------------
      # CMake configure + build (macOS — Xcode or Unix Makefiles)
      # -----------------------------------------------------------------------
      - name: CMake configure — ${{ matrix.plugin_id }}
        if: env.PLUGIN_CHANGED == 'true'
        working-directory: ${{ matrix.folder }}
        run: |
          cmake -B build-ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: CMake build — ${{ matrix.plugin_id }}
        if: env.PLUGIN_CHANGED == 'true'
        working-directory: ${{ matrix.folder }}
        run: cmake --build build-ci --config Release --parallel

      # -----------------------------------------------------------------------
      # Upload compiled artifacts
      # -----------------------------------------------------------------------
      - name: Upload plugin artifacts — ${{ matrix.plugin_id }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin_id }}-macos
          path: ${{ matrix.folder }}/build-ci/${{ matrix.cmake_project }}_artefacts/Release/
          retention-days: 1
          if-no-files-found: error

# ============================================================================
# JOB 4 — package
# Downloads all build artifacts, compiles Windows installers + macOS .pkg/.dmg
# ============================================================================
  package:
    name: Package installers
    needs: [detect-changes, build-windows, build-macos]
    runs-on: macos-latest

    env:
      INSTALLER_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('1.0.{0}', github.run_number) }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout — we need installer/*.iss files (for reference, built on separate runner)
      # -----------------------------------------------------------------------
      - name: Inject PAT into git
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout root repo
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            installer
            .github

      # -----------------------------------------------------------------------
      # 2. Download all macOS build artifacts
      # -----------------------------------------------------------------------
      - name: Download ReverseReverb macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-reverse_reverb-macos
          path: macos-artifacts/ReverseReverb/

      - name: Download RoneStemsFixer macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-stems_fixer-macos
          path: macos-artifacts/RoneStemsFixer/

      - name: Download RoneStutter macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-stutter-macos
          path: macos-artifacts/RoneStutter/

      - name: Download RoneFlanger macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-flanger-macos
          path: macos-artifacts/RoneFlanger/

      - name: Download RonePluginsCenter macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-plugins_center-macos
          path: macos-artifacts/RonePluginsCenter/

      # -----------------------------------------------------------------------
      # 3. Create macOS .pkg installers using pkgbuild
      # -----------------------------------------------------------------------
      - name: Create output directory
        run: mkdir -p build-output

      - name: Build macOS .pkg — ReverseReverb
        run: |
          VERSION=$(echo "${{ env.INSTALLER_VERSION }}" | sed 's/^v//')
          mkdir -p staging/Library/Audio/Plug-Ins/VST3
          mkdir -p staging/Library/Audio/Plug-Ins/Components
          cp -R macos-artifacts/ReverseReverb/VST3/*.vst3 staging/Library/Audio/Plug-Ins/VST3/ 2>/dev/null || true
          cp -R macos-artifacts/ReverseReverb/AU/*.component staging/Library/Audio/Plug-Ins/Components/ 2>/dev/null || true
          pkgbuild --root staging \
                   --identifier com.roneplugins.reversereverb \
                   --version "$VERSION" \
                   --install-location / \
                   build-output/ReverseReverb_Installer.pkg
          rm -rf staging

      - name: Build macOS .pkg — RoneStemsFixer
        run: |
          VERSION=$(echo "${{ env.INSTALLER_VERSION }}" | sed 's/^v//')
          mkdir -p staging/Applications
          cp -R macos-artifacts/RoneStemsFixer/Standalone/*.app staging/Applications/ 2>/dev/null || true
          pkgbuild --root staging \
                   --identifier com.roneplugins.ronestemsfixer \
                   --version "$VERSION" \
                   --install-location / \
                   build-output/RoneStemsFixer_Installer.pkg
          rm -rf staging

      - name: Build macOS .pkg — RoneStutter
        run: |
          VERSION=$(echo "${{ env.INSTALLER_VERSION }}" | sed 's/^v//')
          mkdir -p staging/Library/Audio/Plug-Ins/VST3
          mkdir -p staging/Library/Audio/Plug-Ins/Components
          cp -R macos-artifacts/RoneStutter/VST3/*.vst3 staging/Library/Audio/Plug-Ins/VST3/ 2>/dev/null || true
          cp -R macos-artifacts/RoneStutter/AU/*.component staging/Library/Audio/Plug-Ins/Components/ 2>/dev/null || true
          pkgbuild --root staging \
                   --identifier com.roneplugins.ronestutter \
                   --version "$VERSION" \
                   --install-location / \
                   build-output/RoneStutter_Installer.pkg
          rm -rf staging

      - name: Build macOS .pkg — RoneFlanger
        run: |
          VERSION=$(echo "${{ env.INSTALLER_VERSION }}" | sed 's/^v//')
          mkdir -p staging/Library/Audio/Plug-Ins/VST3
          cp -R macos-artifacts/RoneFlanger/VST3/*.vst3 staging/Library/Audio/Plug-Ins/VST3/ 2>/dev/null || true
          pkgbuild --root staging \
                   --identifier com.roneplugins.roneflanger \
                   --version "$VERSION" \
                   --install-location / \
                   build-output/RoneFlanger_Installer.pkg
          rm -rf staging

      # -----------------------------------------------------------------------
      # 4. Create macOS .dmg for the Center app
      # -----------------------------------------------------------------------
      - name: Build macOS .dmg — RONE Plugins Center
        run: |
          mkdir -p dmg_staging
          # Find the .app bundle in the artifacts
          APP_PATH=$(find macos-artifacts/RonePluginsCenter -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" dmg_staging/
            hdiutil create -volname "RONE Plugins Center" -srcfolder dmg_staging \
              -ov -format UDZO build-output/RONE_Plugins_Center.dmg
          fi
          rm -rf dmg_staging

      # -----------------------------------------------------------------------
      # 5. Upload macOS installers as artifacts
      # -----------------------------------------------------------------------
      - name: Upload macOS .pkg installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            build-output/*.pkg
            build-output/*.dmg
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 6. Create GitHub Release with all installers (tag pushes only)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: RONE Plugins ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            build-output/ReverseReverb_Installer.pkg
            build-output/RoneStemsFixer_Installer.pkg
            build-output/RoneStutter_Installer.pkg
            build-output/RoneFlanger_Installer.pkg
            build-output/RONE_Plugins_Center.dmg
          body: |
            ## RONE Plugins ${{ github.ref_name }}

            ### Hub-First Model
            Download **RONE Plugins Center** below — it's the only installer you need.
            Launch it to browse, install, and update all plugins from one place.

            ### Available Plugins
            - **ReverseReverb** — VST3 + AU + Standalone
            - **RONE Stems Fixer** — Standalone
            - **Rone Stutter** — VST3 + AU + Standalone
            - **Rone Flanger** — VST3 + Standalone

            ### Downloads
            | Platform | Center App | Plugins |
            |----------|-----------|---------|
            | **Windows** | `RONE_Plugins_Center_Installer.exe` | Downloaded by Center |
            | **macOS** | `RONE_Plugins_Center.dmg` | Downloaded by Center |

            ### Installation Paths
            | Platform | VST3 | AU | Standalone |
            |----------|------|----|------------|
            | Windows | `C:\Program Files\Common Files\VST3\RONE\` | — | `C:\Program Files\RONE Plugins\` |
            | macOS | `/Library/Audio/Plug-Ins/VST3/` | `/Library/Audio/Plug-Ins/Components/` | `/Applications/` |

            > Individual plugin installers (.exe / .pkg) are also attached for advanced users.

  # ============================================================================
  # JOB 5 — package-windows (separate runner for Inno Setup)
  # ============================================================================
  package-windows:
    name: Package Windows installers
    needs: [detect-changes, build-windows]
    runs-on: windows-latest

    env:
      INSTALLER_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('1.0.{0}', github.run_number) }}

    steps:
      - name: Inject PAT into git
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout root repo
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            installer
            .github

      # -----------------------------------------------------------------------
      # Download Windows build artifacts
      # -----------------------------------------------------------------------
      - name: Download ReverseReverbVST artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-reverse_reverb-windows
          path: ReverseReverbVST/build-ci/ReverseReverb_artefacts/Release/

      - name: Download RoneStemsFixer artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-stems_fixer-windows
          path: RoneStemsFixer/build-ci/RoneStemsFixer_artefacts/Release/

      - name: Download RoneStutter artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-stutter-windows
          path: RoneStutter/build-ci/RoneStutter_artefacts/Release/

      - name: Download rone-flanger- artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-flanger-windows
          path: rone-flanger-/build-ci/ManualFlanger_artefacts/Release/

      - name: Download RonePluginsCenter artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-plugins_center-windows
          path: RonePluginsCenter/build-ci/RonePluginsCenter_artefacts/Release/

      # -----------------------------------------------------------------------
      # Install Inno Setup 6
      # -----------------------------------------------------------------------
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      # -----------------------------------------------------------------------
      # Compile all 5 Inno Setup installers
      # -----------------------------------------------------------------------
      - name: Create installer output directory
        run: New-Item -ItemType Directory -Force -Path build-output

      - name: Compile Center installer (RONE_Plugins.iss)
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\RONE_Plugins.iss"

      - name: Compile ReverseReverb silent installer
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\ReverseReverb.iss"

      - name: Compile RoneStemsFixer silent installer
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\RoneStemsFixer.iss"

      - name: Compile RoneStutter silent installer
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\RoneStutter.iss"

      - name: Compile RoneFlanger silent installer
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\RoneFlanger.iss"

      # -----------------------------------------------------------------------
      # Upload Windows installers
      # -----------------------------------------------------------------------
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: build-output/*.exe
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Rename for stable URLs + add to GitHub Release (tag pushes only)
      # -----------------------------------------------------------------------
      - name: Rename installers for release (strip version suffix for stable URLs)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ env.INSTALLER_VERSION }}".TrimStart('v')
          $files = @(
            @{ src = "RONE_Plugins_Center_Installer_v$version.exe"; dst = "RONE_Plugins_Center_Installer.exe" },
            @{ src = "ReverseReverb_Installer_v$version.exe";      dst = "ReverseReverb_Installer.exe" },
            @{ src = "RoneStemsFixer_Installer_v$version.exe";     dst = "RoneStemsFixer_Installer.exe" },
            @{ src = "RoneStutter_Installer_v$version.exe";        dst = "RoneStutter_Installer.exe" },
            @{ src = "RoneFlanger_Installer_v$version.exe";        dst = "RoneFlanger_Installer.exe" }
          )
          foreach ($f in $files) {
            Copy-Item "build-output\$($f.src)" "build-output\$($f.dst)"
          }

      - name: Add Windows installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            build-output/RONE_Plugins_Center_Installer.exe
            build-output/ReverseReverb_Installer.exe
            build-output/RoneStemsFixer_Installer.exe
            build-output/RoneStutter_Installer.exe
            build-output/RoneFlanger_Installer.exe

name: Build & Package RONE Plugins Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # also run when a version tag is pushed (e.g. v1.2.0)

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    env:
      # Version = 1.0.<run_number> on branch pushes.
      # When a vX.Y.Z tag is pushed, strip the leading "v" for a clean version.
      INSTALLER_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('1.0.{0}', github.run_number) }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Inject PAT into git at transport level so ALL submodule HTTPS clones
      #    are authenticated, regardless of per-repo credential caching.
      #    GH_PAT must be a classic Personal Access Token with 'repo' scope.
      # -----------------------------------------------------------------------
      - name: Inject PAT into git for private submodule clones
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      # -----------------------------------------------------------------------
      # 2. Set up a Visual Studio developer environment (MSVC + CMake + Ninja)
      # -----------------------------------------------------------------------
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -----------------------------------------------------------------------
      # 3. Download WebView2 SDK once (shared by ReverseReverbVST + RoneStutter)
      #    NuGet extracts to: webview2\Microsoft.Web.WebView2.1.0.1901.177\
      #    JUCE's FindWebView2.cmake globs for *Microsoft.Web.WebView2* inside
      #    JUCE_WEBVIEW2_PACKAGE_LOCATION, so pointing it at webview2\ works.
      # -----------------------------------------------------------------------
      - name: Download WebView2 SDK
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.1901.177 -OutputDirectory "${{ github.workspace }}\webview2"

      # -----------------------------------------------------------------------
      # 4. Build each plugin (Release, 64-bit, output to build-ci/)
      # -----------------------------------------------------------------------
      - name: Build ReverseReverbVST
        working-directory: ReverseReverbVST
        run: |
          cmake -B build-ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release `
            "-DJUCE_WEBVIEW2_PACKAGE_LOCATION=${{ github.workspace }}\webview2"
          cmake --build build-ci --config Release --parallel

      - name: Build RoneStemsFixer
        working-directory: RoneStemsFixer
        run: |
          cmake -B build-ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ci --config Release --parallel

      - name: Build RoneStutter
        working-directory: RoneStutter
        run: |
          cmake -B build-ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release `
            "-DFETCHCONTENT_SOURCE_DIR_WEBVIEW2=${{ github.workspace }}\webview2\Microsoft.Web.WebView2.1.0.1901.177"
          cmake --build build-ci --config Release --parallel

      - name: Restore missing JUCE extras/Build for rone-flanger-
        working-directory: rone-flanger-
        shell: pwsh
        run: |
          # The committed JUCE 8.0.12 copy is missing extras/Build/CMake/ (never committed).
          # Sparse-clone just that directory from GitHub — no full JUCE re-download needed.
          git clone --depth 1 --branch 8.0.12 --filter=blob:none --sparse `
            https://github.com/juce-framework/JUCE.git _juce_build_tmp
          Push-Location _juce_build_tmp
          git sparse-checkout set extras/Build
          Pop-Location
          Copy-Item -Recurse -Force "_juce_build_tmp/extras/Build" "JUCE/extras/Build"
          Remove-Item -Recurse -Force _juce_build_tmp

      - name: Build rone-flanger (ManualFlanger)
        working-directory: rone-flanger-
        run: |
          cmake -B build-ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ci --config Release --parallel

      # -----------------------------------------------------------------------
      # 5. Install Inno Setup 6 (iscc is added to PATH automatically)
      # -----------------------------------------------------------------------
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      # -----------------------------------------------------------------------
      # 6. Compile the combined installer
      #    /DMyAppVersion passes the dynamic version into the .iss #define.
      #    Output lands in build-output\ at the repo root.
      # -----------------------------------------------------------------------
      - name: Create installer output directory
        run: New-Item -ItemType Directory -Force -Path build-output

      - name: Compile Inno Setup installer
        run: |
          $version = "${{ env.INSTALLER_VERSION }}"
          # Strip leading 'v' in case the tag was pushed as "v1.2.3"
          $version = $version.TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "installer\RONE_Plugins.iss"
        shell: pwsh

      # -----------------------------------------------------------------------
      # 7. Upload installer as a workflow artifact (available on every run)
      # -----------------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RONE_Plugins_Installer_v${{ env.INSTALLER_VERSION }}
          path: build-output/RONE_Plugins_Installer_v*.exe
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # 8. Create a GitHub Release when a version tag is pushed (vX.Y.Z)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: RONE Plugins ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build-output/RONE_Plugins_Installer_v*.exe
          body: |
            ## RONE Plugins ${{ github.ref_name }}

            ### Included Plugins
            - **ReverseReverb** — VST3 + Standalone
            - **RONE Stems Fixer** — Standalone
            - **Rone Stutter** — VST3 + Standalone
            - **Rone Flanger** — VST3 + Standalone

            ### Installation Paths
            | Type | Path |
            |------|------|
            | VST3 plugins | `C:\Program Files\Common Files\VST3\RONE\` |
            | Standalone apps | `C:\Program Files\RONE Plugins\` |
            | Desktop shortcuts | Created for all 4 standalone apps |

            Download the `.exe` installer below and run it as Administrator.

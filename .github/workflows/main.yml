name: Smart Build & Release

# ============================================================================
# Smart Update — only build plugins that actually changed.
# Commit-message tags: [win-only] or [mac-only] to skip a platform.
# Tag pushes (v*) force-build everything + create a full bundled release.
# ============================================================================
on:
  push:
    branches: [main]
    tags:     ['v*']

permissions:
  contents: write

jobs:
  # ================================================================
  # 1. DETECT CHANGES — output dynamic build matrices
  # ================================================================
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      matrix_windows: ${{ steps.matrix.outputs.windows }}
      matrix_macos:   ${{ steps.matrix.outputs.macos }}
      has_windows:    ${{ steps.matrix.outputs.has_windows }}
      has_macos:      ${{ steps.matrix.outputs.has_macos }}
      changed:        ${{ steps.matrix.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: false

      - name: Path filter
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            reverse_reverb:
              - 'ReverseReverbVST'
            stems_fixer:
              - 'RoneStemsFixer'
            stutter:
              - 'RoneStutter'
            flanger:
              - 'rone-flanger-'
            plugins_center:
              - 'RonePluginsCenter/**'
              - 'Shared/**'

      - name: Generate build matrices
        id: matrix
        shell: bash
        run: |
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/v') }}
          MSG=$(git log -1 --format=%s)

          SKIP_WIN=false; SKIP_MAC=false
          [[ "$MSG" == *"[mac-only]"* ]] && SKIP_WIN=true
          [[ "$MSG" == *"[win-only]"* ]] && SKIP_MAC=true

          # Change flags — tag push forces all
          if [ "$IS_TAG" = "true" ]; then
            RR=true; SF=true; ST=true; FL=true; PC=true
          else
            RR=${{ steps.filter.outputs.reverse_reverb || 'false' }}
            SF=${{ steps.filter.outputs.stems_fixer    || 'false' }}
            ST=${{ steps.filter.outputs.stutter         || 'false' }}
            FL=${{ steps.filter.outputs.flanger         || 'false' }}
            PC=${{ steps.filter.outputs.plugins_center  || 'false' }}
          fi

          win='[]'; mac='[]'; changed='[]'

          add() {
            local flag=$1 id=$2 folder=$3 cmake=$4 tag=$5 inst=$6 wv=$7 wvf=${8:-} flg=$9 iss=${10}
            [ "$flag" != "true" ] && return
            changed=$(echo "$changed" | jq -c ". + [\"$id\"]")
            local e
            e=$(jq -nc \
              --arg plugin_id      "$id"     \
              --arg folder         "$folder" \
              --arg cmake_project  "$cmake"  \
              --arg release_tag    "$tag"    \
              --arg installer_name "$inst"   \
              --arg needs_webview2 "$wv"     \
              --arg webview2_flag  "$wvf"    \
              --arg is_flanger     "$flg"    \
              --arg iss_file       "$iss"    \
              '$ARGS.named')
            [ "$SKIP_WIN" != "true" ] && win=$(echo "$win" | jq -c ". + [$e]")
            [ "$SKIP_MAC" != "true" ] && mac=$(echo "$mac" | jq -c ". + [$e]")
          }

          #        flag  id                folder              cmake             release-tag               installer-name        wv     wv-flag                           flanger  iss
          add "$RR" reverse_reverb  ReverseReverbVST  ReverseReverb     ReverseReverb-latest      ReverseReverb             true   JUCE_WEBVIEW2_PACKAGE_LOCATION    false    ReverseReverb.iss
          add "$SF" stems_fixer     RoneStemsFixer     RoneStemsFixer    RoneStemsFixer-latest      RoneStemsFixer             false  ""                                false    RoneStemsFixer.iss
          add "$ST" stutter         RoneStutter        RoneStutter       RoneStutter-latest         RoneStutter               true   FETCHCONTENT_SOURCE_DIR_WEBVIEW2  false    RoneStutter.iss
          add "$FL" flanger         rone-flanger-      ManualFlanger     RoneFlanger-latest         RoneFlanger               false  ""                                true     RoneFlanger.iss
          add "$PC" plugins_center  RonePluginsCenter  RonePluginsCenter PluginsCenter-latest       RONE_Plugins_Center       true   JUCE_WEBVIEW2_PACKAGE_LOCATION   false    RONE_Plugins.iss

          echo "windows=$win"     >> $GITHUB_OUTPUT
          echo "macos=$mac"       >> $GITHUB_OUTPUT
          echo "has_windows=$([ "$win" != '[]' ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_macos=$([ "$mac" != '[]' ] && echo true || echo false)"   >> $GITHUB_OUTPUT
          echo "changed=$changed" >> $GITHUB_OUTPUT

          # Summary
          echo "### Smart Build" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Plugins |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | $(echo $win | jq -r '[.[].plugin_id] | join(", ") // "—"') |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | $(echo $mac | jq -r '[.[].plugin_id] | join(", ") // "—"') |" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # 2. BUILD + PACKAGE WINDOWS
  # ================================================================
  build-windows:
    name: "Win: ${{ matrix.plugin_id }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_windows == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix_windows) }}

    steps:
      # --- Checkout ---
      - name: Configure git PAT
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Init submodule — ${{ matrix.folder }}
        run: git submodule update --init --depth 1 -- "${{ matrix.folder }}"

      # --- MSVC ---
      - uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }

      # --- Caches ---
      - name: Build cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.folder }}/build-ci
          key:  build-${{ matrix.plugin_id }}-win-${{ github.sha }}
          restore-keys: build-${{ matrix.plugin_id }}-win-

      - name: WebView2 cache
        if: matrix.needs_webview2 == 'true'
        uses: actions/cache@v4
        id: wv-cache
        with:
          path: ${{ github.workspace }}\webview2
          key:  webview2-nuget-1.0.1901.177

      - name: Download WebView2
        if: matrix.needs_webview2 == 'true' && steps.wv-cache.outputs.cache-hit != 'true'
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.1901.177 -OutputDirectory "${{ github.workspace }}\webview2"

      - name: JUCE extras cache (flanger)
        if: matrix.is_flanger == 'true'
        uses: actions/cache@v4
        id: extras-cache
        with:
          path: rone-flanger-/JUCE/extras/Build
          key:  flanger-juce-extras-8.0.12-win

      - name: Fetch JUCE extras (flanger)
        if: matrix.is_flanger == 'true' && steps.extras-cache.outputs.cache-hit != 'true'
        working-directory: rone-flanger-
        shell: pwsh
        run: |
          git clone --depth 1 --branch 8.0.12 --filter=blob:none --sparse https://github.com/juce-framework/JUCE.git _tmp
          Push-Location _tmp; git sparse-checkout set extras/Build; Pop-Location
          Copy-Item -Recurse -Force _tmp/extras/Build JUCE/extras/Build
          Remove-Item -Recurse -Force _tmp

      # --- Build ---
      - name: CMake configure
        working-directory: ${{ matrix.folder }}
        shell: pwsh
        run: |
          $flags = @("-B","build-ci","-G","Visual Studio 17 2022","-A","x64","-DCMAKE_BUILD_TYPE=Release")
          if ("${{ matrix.needs_webview2 }}" -eq "true") {
            if ("${{ matrix.webview2_flag }}" -eq "JUCE_WEBVIEW2_PACKAGE_LOCATION") {
              $flags += "-DJUCE_WEBVIEW2_PACKAGE_LOCATION=${{ github.workspace }}\webview2"
            } else {
              $flags += "-DFETCHCONTENT_SOURCE_DIR_WEBVIEW2=${{ github.workspace }}\webview2\Microsoft.Web.WebView2.1.0.1901.177"
            }
          }
          cmake @flags

      - name: Verify WebView2 header
        if: matrix.needs_webview2 == 'true'
        shell: pwsh
        run: |
          $headerPath = "${{ github.workspace }}\webview2\Microsoft.Web.WebView2.1.0.1901.177\build\native\include\WebView2.h"
          if (Test-Path $headerPath) {
            Write-Host "✅ WebView2.h found at $headerPath"
          } else {
            Write-Error "❌ WebView2.h NOT found at $headerPath"
            Get-ChildItem "${{ github.workspace }}\webview2" -Recurse -Depth 4 | Select-Object FullName
            exit 1
          }

      - name: CMake build
        working-directory: ${{ matrix.folder }}
        run: cmake --build build-ci --config Release --parallel

      # --- Package with Inno Setup ---
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-output
          $ver = "1.0.${{ github.run_number }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" `
            "/F${{ matrix.installer_name }}_Installer" `
            "installer\${{ matrix.iss_file }}"

      # --- Upload ---
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.plugin_id }}-windows
          path: build-output/${{ matrix.installer_name }}_Installer.exe
          retention-days: 5

  # ================================================================
  # 3. BUILD + PACKAGE MACOS
  # ================================================================
  build-macos:
    name: "Mac: ${{ matrix.plugin_id }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_macos == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix_macos) }}

    steps:
      # --- Checkout ---
      - name: Configure git PAT
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Init submodule — ${{ matrix.folder }}
        run: git submodule update --init --depth 1 -- "${{ matrix.folder }}"

      # --- Caches ---
      - name: Build cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.folder }}/build-ci
          key:  build-${{ matrix.plugin_id }}-mac-${{ github.sha }}
          restore-keys: build-${{ matrix.plugin_id }}-mac-

      - name: JUCE extras cache (flanger)
        if: matrix.is_flanger == 'true'
        uses: actions/cache@v4
        id: extras-cache
        with:
          path: rone-flanger-/JUCE/extras/Build
          key:  flanger-juce-extras-8.0.12-mac

      - name: Fetch JUCE extras (flanger)
        if: matrix.is_flanger == 'true' && steps.extras-cache.outputs.cache-hit != 'true'
        working-directory: rone-flanger-
        run: |
          git clone --depth 1 --branch 8.0.12 --filter=blob:none --sparse https://github.com/juce-framework/JUCE.git _tmp
          cd _tmp && git sparse-checkout set extras/Build && cd ..
          cp -R _tmp/extras/Build JUCE/extras/Build
          rm -rf _tmp

      # --- Build ---
      - name: CMake configure
        working-directory: ${{ matrix.folder }}
        run: cmake -B build-ci -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: CMake build
        working-directory: ${{ matrix.folder }}
        run: cmake --build build-ci --config Release --parallel

      # --- Package ---
      - name: Create macOS installer
        run: |
          mkdir -p build-output
          A="${{ matrix.folder }}/build-ci/${{ matrix.cmake_project }}_artefacts/Release"
          VER="1.0.${{ github.run_number }}"

          if [ "${{ matrix.plugin_id }}" = "plugins_center" ]; then
            # .dmg for the Center app — search broadly in build-ci/
            echo "=== Searching for .app in build-ci ==="
            find "${{ matrix.folder }}/build-ci" -name "*.app" -type d 2>/dev/null
            APP=$(find "${{ matrix.folder }}/build-ci" -name "*.app" -type d | head -1)
            if [ -n "$APP" ]; then
              echo "Found app: $APP"
              mkdir -p dmg_staging && cp -R "$APP" dmg_staging/
              hdiutil create -volname "RONE Plugins Center" -srcfolder dmg_staging \
                -ov -format UDZO build-output/RONE_Plugins_Center.dmg
              rm -rf dmg_staging
            else
              echo "::error::No .app found for plugins_center"
              find "${{ matrix.folder }}/build-ci" -maxdepth 5 -type d | head -40
              exit 1
            fi
          else
            # .pkg for plugins
            mkdir -p staging

            # --- Discover and stage all build artifacts recursively ---
            echo "=== Scanning build artifacts in $A ==="
            find "$A" -maxdepth 3 \( -name "*.vst3" -o -name "*.component" -o -name "*.app" \) -type d | sort
            echo "=== End scan ==="

            # VST3 bundles (recursive search)
            find "$A" -name "*.vst3" -type d 2>/dev/null | while IFS= read -r f; do
              mkdir -p staging/Library/Audio/Plug-Ins/VST3
              cp -R "$f" staging/Library/Audio/Plug-Ins/VST3/
              echo "Staged VST3: $(basename "$f")"
            done

            # AU bundles (recursive search)
            find "$A" -name "*.component" -type d 2>/dev/null | while IFS= read -r f; do
              mkdir -p staging/Library/Audio/Plug-Ins/Components
              cp -R "$f" staging/Library/Audio/Plug-Ins/Components/
              echo "Staged AU: $(basename "$f")"
            done

            # Standalone .app — search Standalone/ first, then Release/ root
            # Works for both juce_add_plugin (Standalone/) and juce_add_gui_app (root)
            find "$A" -name "*.app" -type d -maxdepth 2 2>/dev/null | while IFS= read -r f; do
              mkdir -p staging/Applications
              cp -R "$f" staging/Applications/
              echo "Staged App: $(basename "$f") -> /Applications/"
            done

            # --- Fail-safe: refuse to create empty pkg ---
            FILE_COUNT=$(find staging -type f 2>/dev/null | wc -l | tr -d ' ')
            if [ "$FILE_COUNT" -eq 0 ]; then
              echo "::error::FATAL: No artifacts found for ${{ matrix.plugin_id }}. Staging is empty!"
              find "$A" -maxdepth 3 -type d | head -30
              exit 1
            fi
            echo "Total files staged: $FILE_COUNT"

            if ! find staging/Applications -name "*.app" -type d -maxdepth 1 2>/dev/null | grep -q .; then
              echo "::warning::No standalone .app found for ${{ matrix.plugin_id }}"
            fi

            # --- Component plist: disable BundleIsRelocatable ---
            pkgbuild --analyze --root staging /tmp/comp.plist
            python3 -c "import plistlib; f=open('/tmp/comp.plist','rb'); p=plistlib.load(f); f.close(); [item.__setitem__('BundleIsRelocatable',False) for item in p]; f=open('/tmp/comp.plist','wb'); plistlib.dump(p,f); f.close()"
            echo "Component plist contents:"
            cat /tmp/comp.plist

            pkgbuild --root staging \
              --component-plist /tmp/comp.plist \
              --identifier "com.roneplugins.${{ matrix.plugin_id }}" \
              --version "$VER" \
              --install-location / \
              build-output/${{ matrix.installer_name }}_Installer.pkg

            echo "Created: ${{ matrix.installer_name }}_Installer.pkg ($(du -h build-output/${{ matrix.installer_name }}_Installer.pkg | cut -f1))"
            rm -rf staging
          fi

      # --- Upload ---
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.plugin_id }}-macos
          path: |
            build-output/*.pkg
            build-output/*.dmg
          retention-days: 5

  # ================================================================
  # 4. RELEASE — per-plugin rolling releases with stable download URLs
  # ================================================================
  release:
    name: Release
    needs: [detect-changes, build-windows, build-macos]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.changed != '[]' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result   == 'success' || needs.build-macos.result   == 'skipped')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: installer-*

      - name: Create per-plugin releases
        run: |
          REPO="${{ github.repository }}"
          changed='${{ needs.detect-changes.outputs.changed }}'

          for id in $(echo "$changed" | jq -r '.[]'); do
            case "$id" in
              reverse_reverb) tag=ReverseReverb-latest;    title="ReverseReverb (Latest)" ;;
              stems_fixer)    tag=RoneStemsFixer-latest;    title="RONE Stems Fixer (Latest)" ;;
              stutter)        tag=RoneStutter-latest;       title="Rone Stutter (Latest)" ;;
              flanger)        tag=RoneFlanger-latest;       title="Rone Flanger (Latest)" ;;
              plugins_center) tag=PluginsCenter-latest;     title="RONE Plugins Center (Latest)" ;;
            esac

            # Collect all installer files for this plugin
            files=()
            for dir in artifacts/installer-${id}-*/; do
              [ -d "$dir" ] || continue
              for f in "$dir"*; do
                [ -f "$f" ] && files+=("$f")
              done
            done

            if [ ${#files[@]} -eq 0 ]; then
              echo "⚠ No artifacts for $id — skipping"
              continue
            fi

            # Delete old release + recreate with fresh files
            gh release delete "$tag" -y --cleanup-tag -R "$REPO" 2>/dev/null || true
            sleep 2
            gh release create "$tag" "${files[@]}" \
              --title "$title" \
              --notes "Build #${{ github.run_number }} · $(date -u +%Y-%m-%d)" \
              --latest=false \
              -R "$REPO"

            echo "✓ $tag — ${#files[@]} file(s)"
          done

      # On tag push: also create a full versioned release
      - name: Create version release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          files=()
          for f in artifacts/installer-*/*; do
            [ -f "$f" ] && files+=("$f")
          done

          gh release create "$TAG" "${files[@]}" \
            --title "RONE Plugins $TAG" \
            --generate-notes \
            -R "$REPO"

  # ================================================================
  # 5. UPDATE MANIFEST — auto-bump versions.json + commit
  # ================================================================
  update-manifest:
    name: Update versions.json
    needs: [detect-changes, release]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.changed != '[]' &&
      needs.release.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: false
          ref: main

      - name: Init changed submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          changed='${{ needs.detect-changes.outputs.changed }}'
          for id in $(echo "$changed" | jq -r '.[]'); do
            case "$id" in
              reverse_reverb) f=ReverseReverbVST ;;
              stems_fixer)    f=RoneStemsFixer ;;
              stutter)        f=RoneStutter ;;
              flanger)        f=rone-flanger- ;;
              plugins_center) f=RonePluginsCenter ;;
            esac
            git submodule update --init --depth 1 -- "$f" 2>/dev/null || true
          done

      - name: Bump versions.json
        run: |
          changed='${{ needs.detect-changes.outputs.changed }}'
          RUN="${{ github.run_number }}"
          REPO="${{ github.repository }}"

          for id in $(echo "$changed" | jq -r '.[]'); do
            case "$id" in
              reverse_reverb) folder=ReverseReverbVST;  jid=ReverseReverb;  tag=ReverseReverb-latest;  inst=ReverseReverb ;;
              stems_fixer)    folder=RoneStemsFixer;     jid=RoneStemsFixer;  tag=RoneStemsFixer-latest;  inst=RoneStemsFixer ;;
              stutter)        folder=RoneStutter;        jid=RoneStutter;     tag=RoneStutter-latest;     inst=RoneStutter ;;
              flanger)        folder=rone-flanger-;      jid=RoneFlanger;     tag=RoneFlanger-latest;     inst=RoneFlanger ;;
              plugins_center) folder=RonePluginsCenter;  jid=__center__;     tag=PluginsCenter-latest;   inst=RONE_Plugins_Center ;;
            esac

            # Read base version from CMakeLists.txt
            base=$(grep -oP 'VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' "$folder/CMakeLists.txt" | head -1 || echo "1.0.0")
            ver="${base}.${RUN}"

            if [ "$jid" = "__center__" ]; then
              jq --arg v "$ver" \
                 --arg u  "https://github.com/$REPO/releases/download/$tag/${inst}_Installer.exe" \
                 --arg um "https://github.com/$REPO/releases/download/$tag/${inst}.dmg" \
                 '.center_installer.version=$v | .center_installer.url=$u | .center_installer.url_mac=$um' \
                 versions.json > tmp && mv tmp versions.json
            else
              jq --arg id "$jid" --arg v "$ver" \
                 --arg u  "https://github.com/$REPO/releases/download/$tag/${inst}_Installer.exe" \
                 --arg um "https://github.com/$REPO/releases/download/$tag/${inst}_Installer.pkg" \
                 '(.plugins[]|select(.id==$id)).version=$v |
                  (.plugins[]|select(.id==$id)).download_url=$u |
                  (.plugins[]|select(.id==$id)).download_url_mac=$um' \
                 versions.json > tmp && mv tmp versions.json
            fi
          done

          # Timestamp
          jq --arg t "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '.last_updated=$t' versions.json > tmp && mv tmp versions.json

          echo "### Updated versions.json" >> $GITHUB_STEP_SUMMARY
          cat versions.json | jq '.' >> $GITHUB_STEP_SUMMARY

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: auto-update versions.json (build #${{ github.run_number }}) [skip ci]"
          git push
